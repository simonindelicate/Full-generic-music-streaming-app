<!DOCTYPE html>
<html>
  <head>
    <title>Add Album & Tracks</title>
    <link rel="stylesheet" href="/styles/admin.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body>
    <div class="admin-shell">
      <div class="card">
        <h1>Upload a new album</h1>
        <p class="meta">Add an album once, then drop in each track below. All fields can be edited later.</p>

        <form id="addTrackForm">
          <div class="form-grid">
            <div>
              <label for="albumName">Album Name</label>
              <input type="text" id="albumName" name="albumName" placeholder="Album title" required />
            </div>
            <div>
              <label for="albumId">Album ID (optional)</label>
              <input type="text" id="albumId" name="albumId" placeholder="slug-used-in-player" />
            </div>
            <div>
              <label for="artistName">Artist Name</label>
              <input type="text" id="artistName" name="artistName" value="Simon Indelicate" required />
            </div>
            <div>
              <label for="artworkUrl">Artwork URL</label>
              <input type="url" id="artworkUrl" name="artworkUrl" placeholder="https://.../cover.jpg" />
            </div>
            <div>
              <label for="albumArtworkUrl">Album Artwork URL (optional)</label>
              <input type="url" id="albumArtworkUrl" name="albumArtworkUrl" placeholder="Overrides cover art for player" />
            </div>
            <div>
              <label for="pinCode">PIN Code</label>
              <input type="password" id="pinCode" name="pinCode" required />
            </div>
            <div style="display:flex; align-items:center; gap:8px;">
              <input type="checkbox" id="albumPublished" name="albumPublished" checked />
              <label for="albumPublished" style="margin:0;">Album published?</label>
            </div>
          </div>

          <h3>Tracks</h3>
          <div id="tracksContainer" class="tracks-preview"></div>
          <button type="button" id="addTrackButton">+ Add another track</button>

          <div class="actions" style="margin-top:16px;">
            <button type="submit" id="submitButton">Add Tracks</button>
            <a class="button-link button-secondary" href="edit.html">Jump to edit list</a>
          </div>
          <div id="formStatus" class="status" style="display:none;"></div>
        </form>
      </div>
    </div>

    <script>
      const addTrackForm = document.getElementById('addTrackForm');
      const tracksContainer = document.getElementById('tracksContainer');
      const addTrackButton = document.getElementById('addTrackButton');
      const formStatus = document.getElementById('formStatus');
      const submitButton = document.getElementById('submitButton');

      let nextTrackNumber = 1;

      function createTrackRow() {
        const wrapper = document.createElement('div');
        wrapper.className = 'track-row card';

        const nameInput = document.createElement('input');
        nameInput.type = 'text';
        nameInput.className = 'trackName';
        nameInput.name = 'trackName';
        nameInput.placeholder = 'Track title';
        nameInput.required = true;

        const urlInput = document.createElement('input');
        urlInput.type = 'url';
        urlInput.className = 'mp3Url';
        urlInput.name = 'mp3Url';
        urlInput.placeholder = 'https://.../audio.mp3';
        urlInput.required = true;

        const durationInput = document.createElement('input');
        durationInput.type = 'number';
        durationInput.className = 'durationSeconds';
        durationInput.name = 'durationSeconds';
        durationInput.placeholder = 'Duration (seconds)';

        const yearInput = document.createElement('input');
        yearInput.type = 'number';
        yearInput.className = 'trackYear';
        yearInput.name = 'year';
        yearInput.placeholder = 'Year';

        const genreInput = document.createElement('input');
        genreInput.type = 'text';
        genreInput.className = 'trackGenre';
        genreInput.name = 'genre';
        genreInput.placeholder = 'Genre';

        const mediumInput = document.createElement('input');
        mediumInput.type = 'text';
        mediumInput.className = 'trackMedium';
        mediumInput.name = 'trackMedium';
        mediumInput.placeholder = 'Track medium / version';

        const textInput = document.createElement('textarea');
        textInput.className = 'trackText';
        textInput.name = 'trackText';
        textInput.placeholder = 'Notes / lyrics / description';

        const numberInput = document.createElement('input');
        numberInput.type = 'number';
        numberInput.className = 'trackNumber';
        numberInput.name = 'trackNumber';
        numberInput.value = nextTrackNumber;
        numberInput.min = 1;
        numberInput.required = true;

        const nameLabel = document.createElement('label');
        nameLabel.textContent = 'Track Name';
        nameLabel.appendChild(nameInput);

        const urlLabel = document.createElement('label');
        urlLabel.textContent = 'MP3 URL';
        urlLabel.appendChild(urlInput);

        const numberLabel = document.createElement('label');
        numberLabel.textContent = 'Order';
        numberLabel.appendChild(numberInput);

        const durationLabel = document.createElement('label');
        durationLabel.textContent = 'Duration (seconds)';
        durationLabel.appendChild(durationInput);

        const yearLabel = document.createElement('label');
        yearLabel.textContent = 'Year';
        yearLabel.appendChild(yearInput);

        const genreLabel = document.createElement('label');
        genreLabel.textContent = 'Genre';
        genreLabel.appendChild(genreInput);

        const mediumLabel = document.createElement('label');
        mediumLabel.textContent = 'Track Medium';
        mediumLabel.appendChild(mediumInput);

        const textLabel = document.createElement('label');
        textLabel.textContent = 'Track Text';
        textLabel.appendChild(textInput);

        wrapper.appendChild(nameLabel);
        wrapper.appendChild(urlLabel);
        wrapper.appendChild(numberLabel);
        wrapper.appendChild(durationLabel);
        wrapper.appendChild(yearLabel);
        wrapper.appendChild(genreLabel);
        wrapper.appendChild(mediumLabel);
        wrapper.appendChild(textLabel);

        nextTrackNumber++;
        return wrapper;
      }

      function addTrackRow() {
        const row = createTrackRow();
        tracksContainer.appendChild(row);
      }

      addTrackButton.addEventListener('click', addTrackRow);

      // seed first row
      addTrackRow();

      addTrackForm.addEventListener('submit', event => {
        event.preventDefault();
        formStatus.style.display = 'none';
        submitButton.disabled = true;
        submitButton.textContent = 'Saving…';

        const formData = new FormData(addTrackForm);
        const album = {
          albumName: formData.get('albumName'),
          artistName: formData.get('artistName'),
          artworkUrl: formData.get('artworkUrl'),
          albumId: formData.get('albumId'),
          albumArtworkUrl: formData.get('albumArtworkUrl'),
          published: document.getElementById('albumPublished').checked
        };

        const pinCode = formData.get('pinCode');
        if (pinCode !== '1310') {
          showStatus('Incorrect PIN code', true);
          submitButton.disabled = false;
          submitButton.textContent = 'Add Tracks';
          return;
        }

        const trackNameInputs = addTrackForm.querySelectorAll('.trackName');
        const mp3UrlInputs = addTrackForm.querySelectorAll('.mp3Url');
        const trackNumberInputs = addTrackForm.querySelectorAll('.trackNumber');
        const durationInputs = addTrackForm.querySelectorAll('.durationSeconds');
        const yearInputs = addTrackForm.querySelectorAll('.trackYear');
        const genreInputs = addTrackForm.querySelectorAll('.trackGenre');
        const mediumInputs = addTrackForm.querySelectorAll('.trackMedium');
        const textInputs = addTrackForm.querySelectorAll('.trackText');

        const tracks = [];
        for (let i = 0; i < trackNameInputs.length; i++) {
          const trackName = trackNameInputs[i].value;
          const mp3Url = mp3UrlInputs[i].value;
          const trackNumber = trackNumberInputs[i].value;
          const durationSeconds = durationInputs[i].value;
          const year = yearInputs[i].value;
          const genre = genreInputs[i].value;
          const trackMedium = mediumInputs[i].value;
          const trackText = textInputs[i].value;
          tracks.push({ trackName, mp3Url, trackNumber, durationSeconds, year, genre, trackMedium, trackText });
        }

        fetch('/.netlify/functions/addTrack', {
          method: 'POST',
          body: JSON.stringify({ album, tracks }),
          headers: {
            'Content-Type': 'application/json'
          }
        })
          .then(response => response.json())
          .then(() => {
            showStatus('Album and tracks saved. You can add more or jump to editing.', false);
            addTrackForm.reset();
            tracksContainer.innerHTML = '';
            nextTrackNumber = 1;
            addTrackRow();
          })
          .catch(error => {
            console.error(error);
            showStatus('Something went wrong saving to the database.', true);
          })
          .finally(() => {
            submitButton.disabled = false;
            submitButton.textContent = 'Add Tracks';
          });
      });

      function showStatus(message, isError) {
        formStatus.textContent = message;
        formStatus.style.display = 'block';
        formStatus.style.background = isError ? '#fff3f3' : '#f1f7ff';
        formStatus.style.borderColor = isError ? '#f1aeb5' : '#d5e5ff';
        formStatus.style.color = isError ? '#8c1d2e' : '#1f4b99';
      }
    </script>
  </body>
</html>
