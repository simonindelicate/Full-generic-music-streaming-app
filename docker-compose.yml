services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      # Persistent storage for uploads and metadata.
      # All uploaded files and tracks.json live here — back this up.
      - ./storage:/app/storage
    # Expose directly if you're not using nginx (e.g. behind an existing reverse proxy)
    # ports:
    #   - "3000:3000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
