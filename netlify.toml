[build]
  publish = "public"
  functions = "api"

[functions]
  # zisi bundles native modules (like sharp) correctly for the Lambda runtime.
  # esbuild (the default) strips native .node binaries, breaking sharp.
  node_bundler = "zisi"

[[redirects]]
  from = "/"
  to = "/player.html"
  status = 200

[[redirects]]
  from = "/catalogue"
  to = "/.netlify/functions/catalogue"
  status = 200

[[redirects]]
  from = "/album/:albumId"
  to = "/.netlify/functions/makeSharePage?album=:albumId"
  status = 200

[[redirects]]
  from = "/album/:albumId/track/:trackId"
  to = "/.netlify/functions/makeSharePage?album=:albumId&track=:trackId"
  status = 200

[[redirects]]
  from = "/track/:trackId"
  to = "/.netlify/functions/makeSharePage?track=:trackId"
  status = 200

[[redirects]]
  from = "/track/:trackId/:slug"
  to = "/.netlify/functions/makeSharePage?track=:trackId"
  status = 200

[[headers]]
  for = "/player.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/welcome-config.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/.netlify/functions/siteSettings"
  [headers.values]
    Cache-Control = "private, max-age=0, must-revalidate"
